<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080810;--surface:#10101a;--surface2:#16161f;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#f2f2f7;--muted:rgba(242,242,247,0.44);--hint:rgba(242,242,247,0.22);
  --r:22px;--r-sm:16px;--r-xs:10px;
}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text)}

/* SCREENS */
.screen{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;transition:transform 0.38s cubic-bezier(.77,0,.18,1),opacity 0.38s ease;will-change:transform}
.screen.hidden-right{transform:translateX(100%);opacity:0;pointer-events:none}
.screen.hidden-left{transform:translateX(-100%);opacity:0;pointer-events:none}
.screen.visible{transform:translateX(0);opacity:1}

/* ═══════════════ PAGE 1 — ACCUEIL ═══════════════ */
#page1{background:var(--bg);padding:0 0 40px}
.p1-header{padding:56px 22px 28px;display:flex;align-items:flex-start;justify-content:space-between}
.p1-eyebrow{font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.p1-title{font-size:30px;font-weight:700;letter-spacing:-0.04em;line-height:1.05;color:var(--text)}
.rings-svg{width:64px;height:64px;flex-shrink:0}

/* DAY CARDS GRID */
.days-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 14px}

.day-card{border-radius:var(--r);overflow:hidden;position:relative;height:200px;cursor:pointer;transition:transform 0.22s cubic-bezier(.34,1.56,.64,1)}
.day-card:hover{transform:scale(1.025)}
.day-card:active{transform:scale(0.97)}
.day-card img{width:100%;height:100%;object-fit:cover;display:block}
.day-card .dc-overlay{position:absolute;inset:0;background:linear-gradient(160deg,rgba(0,0,0,0.08) 0%,rgba(0,0,0,0.72) 100%)}
.day-card .dc-content{position:absolute;inset:0;padding:16px;display:flex;flex-direction:column;justify-content:flex-end}
.day-card .dc-tag{font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 9px;border-radius:20px;display:inline-block;width:fit-content;margin-bottom:8px;opacity:0.9}
.day-card .dc-name{font-size:19px;font-weight:700;letter-spacing:-0.03em;color:#fff;line-height:1}
.day-card .dc-meta{font-size:11px;color:rgba(255,255,255,0.55);margin-top:4px}
.day-card .dc-count{position:absolute;top:14px;right:14px;background:rgba(0,0,0,0.45);backdrop-filter:blur(6px);border-radius:20px;padding:4px 10px;font-size:10px;font-weight:600;color:rgba(255,255,255,0.85);display:flex;align-items:center;gap:4px}
.day-card .dc-count::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;display:block}

/* ═══════════════ PAGE 2 — PROGRAMME ═══════════════ */
#page2{background:var(--bg);padding:0 0 50px}

.p2-hero{position:relative;height:260px;overflow:hidden}
.p2-hero img{width:100%;height:100%;object-fit:cover;display:block}
.p2-hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,var(--bg) 0%,rgba(8,8,16,0.25) 60%)}
.p2-back{position:absolute;top:52px;left:16px;width:38px;height:38px;border-radius:50%;background:rgba(0,0,0,0.5);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;cursor:pointer;border:0.5px solid rgba(255,255,255,0.18);transition:background 0.15s}
.p2-back:hover{background:rgba(255,255,255,0.12)}
.p2-back svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.p2-hero-content{position:absolute;bottom:0;left:0;right:0;padding:20px 20px 0}
.p2-tag{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:4px 12px;border-radius:20px;display:inline-block;margin-bottom:10px;opacity:0.92}
.p2-day-name{font-size:28px;font-weight:700;letter-spacing:-0.04em;color:#fff;line-height:1}
.p2-day-meta{font-size:13px;color:rgba(255,255,255,0.5);margin-top:5px;padding-bottom:18px}

/* STATS ROW */
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:14px 14px 22px}
.stat-box{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r-sm);padding:14px 12px;text-align:center}
.stat-val{font-size:20px;font-weight:700;letter-spacing:-0.03em;color:var(--text);line-height:1}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:4px;letter-spacing:0.04em;text-transform:uppercase}

/* EX SECTION */
.p2-section{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);padding:0 18px;margin-bottom:12px}
.ex-list{display:flex;flex-direction:column;gap:10px;padding:0 14px}

.ex-card{display:flex;align-items:center;border-radius:var(--r);overflow:hidden;background:var(--surface);border:0.5px solid var(--border);cursor:pointer;text-decoration:none;transition:all 0.18s ease;position:relative}
.ex-card:hover{background:var(--surface2);border-color:var(--border2);transform:translateX(4px)}
.ex-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent,#0a84ff);opacity:0;transition:opacity 0.18s;border-radius:0}
.ex-card:hover::before{opacity:1}
.ex-thumb{width:90px;height:72px;object-fit:cover;flex-shrink:0}
.ex-body{flex:1;min-width:0;padding:0 12px}
.ex-name{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:5px}
.ex-pills{display:flex;gap:6px;align-items:center}
.pill{font-size:10px;font-weight:500;padding:2px 9px;border-radius:20px}
.pill-time{background:rgba(255,255,255,0.07);color:var(--muted)}
.pill-yt{background:rgba(255,55,95,0.12);color:#ff5f75}
.ex-chevron{padding:0 16px;color:var(--hint);font-size:18px;flex-shrink:0}

/* TOTAL */
.total-card{margin:16px 14px 0;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r-sm);padding:14px 18px;display:flex;justify-content:space-between;align-items:center}
.total-card .lbl{font-size:12px;color:var(--muted)}
.total-card .val{font-size:16px;font-weight:700;color:var(--text)}

/* VIDEO PLAYER */
.video-player-wrap{
  overflow:hidden;
  max-height:0;
  transition:max-height 0.42s cubic-bezier(.77,0,.18,1), opacity 0.3s ease, margin 0.3s ease;
  opacity:0;
  margin:0 14px;
  border-radius:var(--r);
}
.video-player-wrap.open{
  max-height:260px;
  opacity:1;
  margin:0 14px 10px;
}
.video-player-wrap iframe{
  width:100%;
  height:220px;
  border:none;
  display:block;
  border-radius:var(--r);
  background:#000;
}
.video-close-btn{
  display:flex;
  align-items:center;
  justify-content:flex-end;
  padding:8px 10px 6px;
  gap:6px;
  font-size:11px;
  font-weight:600;
  color:var(--muted);
  cursor:pointer;
  letter-spacing:0.04em;
  text-transform:uppercase;
}
.video-close-btn:hover{color:var(--text)}
.yt-player-div{width:100%;height:220px;border-radius:var(--r);overflow:hidden;background:#000}
.yt-player-div iframe{border-radius:var(--r)}

.ex-card.active{
  background:var(--surface2);
  border-color:var(--border2);
}
.ex-card.active::before{opacity:1}
.ex-play-icon{
  width:34px;height:34px;border-radius:50%;
  background:rgba(255,255,255,0.08);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-right:4px;
  transition:background 0.15s;
}
.ex-card:hover .ex-play-icon,.ex-card.active .ex-play-icon{background:rgba(255,255,255,0.15)}
.ex-play-icon svg{width:14px;height:14px;fill:rgba(255,255,255,0.8);margin-left:2px}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.days-grid .day-card{animation:fadeUp 0.35s ease both}
.days-grid .day-card:nth-child(1){animation-delay:.04s}
.days-grid .day-card:nth-child(2){animation-delay:.09s}
.days-grid .day-card:nth-child(3){animation-delay:.14s}
.days-grid .day-card:nth-child(4){animation-delay:.19s}
.days-grid .day-card:nth-child(5){animation-delay:.24s}
.days-grid .day-card:nth-child(6){animation-delay:.29s}
.days-grid .day-card:nth-child(7){animation-delay:.34s}
.ex-card{animation:fadeUp 0.3s ease both}
.ex-card:nth-child(1){animation-delay:.03s}.ex-card:nth-child(2){animation-delay:.07s}
.ex-card:nth-child(3){animation-delay:.11s}.ex-card:nth-child(4){animation-delay:.15s}
.ex-card:nth-child(5){animation-delay:.19s}
</style>
</head>

      <div class="dc-name">${d.name}</div>
      <div class="dc-meta">${d.dur} · ${d.kcal} kcal</div>
    </div>
  `;
  card.addEventListener('click',()=>openDay(i));
  grid.appendChild(card);
});

function openDay(i){
  const d=DAYS[i];
  const total=d.exercises.reduce((s,e)=>s+parseInt(e.time)||0,0);

  document.getElementById('p2Img').src=d.img;
  document.getElementById('p2Tag').textContent=d.dur+' · '+d.kcal+' kcal';
  document.getElementById('p2Tag').style.cssText=`background:${d.colorBg};color:${d.color}`;
  document.getElementById('p2Name').textContent=d.name;
  document.getElementById('p2Meta').textContent=d.exercises.length+' exercices programmés';

  document.getElementById('statsRow').innerHTML=`
    <div class="stat-box"><div class="stat-val" style="color:${d.color}">${d.exercises.length}</div><div class="stat-lbl">Exercices</div></div>
    <div class="stat-box"><div class="stat-val" style="color:${d.color}">${total}</div><div class="stat-lbl">Minutes</div></div>
    <div class="stat-box"><div class="stat-val" style="color:${d.color}">${d.kcal}</div><div class="stat-lbl">Kcal</div></div>
  `;

  const list=document.getElementById('exList');
  list.innerHTML='';
  d.exercises.forEach((ex,idx)=>{
    // Extract YouTube video ID
    const ytMatch = ex.url.match(/(?:v=|youtu\.be\/)([^&?/]+)/);
    const ytId = ytMatch ? ytMatch[1] : null;

    // Card
    const card=document.createElement('div');
    card.className='ex-card';
    card.style.setProperty('--accent',d.color);
    card.innerHTML=`
      <img class="ex-thumb" src="${ex.img}" alt="${ex.name}" loading="lazy">
      <div class="ex-body">
        <div class="ex-name">${ex.name}</div>
        <div class="ex-pills">
          <span class="pill pill-time">${ex.time}</span>
          <span class="pill pill-yt">▶ YouTube</span>
        </div>
      </div>
      <div class="ex-play-icon">
        <svg viewBox="0 0 16 16"><path d="M4 2.5l9 5.5-9 5.5z"/></svg>
      </div>
    `;

    // Video player container (inserted right after the card)
    const playerWrap=document.createElement('div');
    playerWrap.className='video-player-wrap';
    const divId = 'yt-player-'+idx+'-'+Date.now();
    playerWrap.innerHTML=`
      <div class="video-close-btn" data-close>
        <svg viewBox="0 0 14 14"><line x1="2" y1="2" x2="12" y2="12"/><line x1="12" y1="2" x2="2" y2="12"/></svg>
        Fermer
      </div>
      <div id="${divId}" class="yt-player-div"></div>
    `;

    let ytPlayer = null;
    let playerReady = false;

    async function openPlayer(){
      card.classList.add('active');
      playerWrap.classList.add('open');

      await ytReady; // attend que l'API soit disponible

      if(!ytPlayer){
        ytPlayer = new YT.Player(divId, {
          height:'220',
          width:'100%',
          videoId: ytId,
          playerVars:{autoplay:1, rel:0, modestbranding:1, playsinline:1},
          events:{
            onReady: e => { playerReady=true; e.target.playVideo(); }
          }
        });
      } else {
        if(playerReady) ytPlayer.playVideo();
      }

      setTimeout(()=>{
        card.scrollIntoView({behavior:'smooth', block:'start'});
      }, 80);
    }

    function closePlayer(){
      card.classList.remove('active');
      playerWrap.classList.remove('open');
      if(ytPlayer && playerReady) ytPlayer.pauseVideo();
    }

    card.addEventListener('click',()=>{
      const isOpen = card.classList.contains('active');
      // Close all others
      closeAllPlayers();
      if(!isOpen && ytId) openPlayer();
    });

    playerWrap.querySelector('[data-close]').addEventListener('click',(e)=>{
      e.stopPropagation();
      closePlayer();
    });

    card._closePlayer = closePlayer;

    list.appendChild(card);
    list.appendChild(playerWrap);
  });

  document.getElementById('totalCard').innerHTML=`<span class="lbl">Durée totale</span><span class="val">${total} min</span>`;

  p2.scrollTop=0;
  p1.classList.remove('visible'); p1.classList.add('hidden-left');
  p2.classList.remove('hidden-right'); p2.classList.add('visible');
}

document.getElementById('backBtn').addEventListener('click',()=>{
  closeAllPlayers();
  p2.classList.remove('visible'); p2.classList.add('hidden-right');
  p1.classList.remove('hidden-left'); p1.classList.add('visible');
});

function closeAllPlayers(){
  document.querySelectorAll('.ex-card.active').forEach(c=>{
    if(c._closePlayer) c._closePlayer();
    else c.classList.remove('active');
  });
  document.querySelectorAll('.video-player-wrap.open').forEach(p=>p.classList.remove('open'));
}
</script>
</body>
